<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto</title>
    <script src="https://kit.fontawesome.com/988dc92aba.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./produto_estilo.css">
</head>
<body>
    <header id="container_hero">
        <div class="left">
            <ul class="container_nav">
                <li><a href="Inicio/catalgo.html">Inicio</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </div>
        <div class="center_logo">
            <img src="img/8665705.jpg" alt="">
        </div>
        <div class="right">
            <a class="bt_entrar" href=""><button>Entrar</button></a>
            <a class="bt_criarConta" href=""><button>Criar conta</button></a>
        </div>
    </header>
    <main id="container_main">
        <div class="container_aviso">
            <span class="aviso_destaque"><p>3 vagas disponíveis</p></span> <p>Garanta sua reserva agora antes que acabe</p>
        </div>
        <div class="container_topo"> <!--Subtitulo, pesquisa, carrinho e favorito-->
            <div class="titulo_pag">
                <h2>Catalogo</h2>
            </div>
            <div class="search">
                <input type="search" name="pesquisar" id="idPesquisar" placeholder="Pesquisar"> <span><i class="fa-brands fa-sistrix"></i></span>
            </div>
            <div class="right_side">
                <a href="#" class="carrinho"</a><i class="fa-solid fa-cart-shopping"></i> <span class="etiqueta"><p>Carrinho</p></span></a>
                <a href="#" class="favorito"><i class="fa-regular fa-heart" style="background-color: #721B1F;"></i><span class="etiqueta"><p style="color: #721B1F;">Favorito</p></span></a>
            </div>
        </div>

        <div id="container_produto">
            <div class="left_side"> <!--Fotos-->
                <div class="img_produto">
                    <img src="../img/pack_001/modelos/roupas/sueter feminino.jpg" alt="">
                </div>
                <div class="carrosel_img">
                    <ul>
                        <li class="img1"><img src="../img/pack_001/modelos/roupas/sueter feminino.jpg" alt=""></li>
                        <li class="img1"><img src="../img/pack_001/modelos/roupas/sueter feminino.jpg" alt=""></li>
                        <li class="img1"><img src="../img/pack_001/modelos/roupas/sueter feminino.jpg" alt=""></li>
                    </ul>
                    <div class="seta_direita">
                        <i class="fa-solid fa-arrow-right"></i>
                    </div>
                </div>
            </div><!--Fim fotos-->
            <div class="right-side">
                <div class="info_prodtuo">
                    <h4>Suéter Feminino</h4>
                    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit.</p>
                </div>
                <div class="cor_produto">
                    <label for="iCor">Cor:</label>
                    <div class="bt_cascata"><!--botao em cascata-->
                        <span class="img_cores"><img src="" alt=""></span>
                        <span class="label_cores">Verde e bege</span>
                        <span class="seta_baixo"><i class="fa-solid fa-arrow-down"></i></span>
                    </div><!--Fim botao em cascata-->
                </div>
                <div class="tamanho_produto">
                    <label for="iSize">Tamanho:</label>
                    <span id="pp_size" class="medidas"><a href="#"><button>PP</button></a></span>
                    <span id="p_size" class="medidas"><a href="#"><button>P</button></a></span>
                    <span id="m_size" class="medidas"><a href="#"><button>M</button></a></span>
                    <span id="g_size" class="medidas"><a href="#"><button>G</button></a></span>
                    <span id="gg_size" class="medidas"><a href="#"><button>GG</button></a></span>
                </div>
                <div class="guia_medida">
                    <p>Saiba mais sobre as medidas</p> <span class="seta_direita"><i class="fa-solid fa-arrow-right"></i></span>
                </div>
            </div>
        </div>

    </main>
</body>
</html>

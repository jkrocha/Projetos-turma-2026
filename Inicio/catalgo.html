<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://kit.fontawesome.com/988dc92aba.js" crossorigin="anonymous"></script>
     <link rel="stylesheet" href="catalogo_estilo.css">
    <title>Catalogo</title>
</head>
<body>
    <header id="container_hero">
        <div class="left">
            <ul class="container_nav">
                <li><a href="Inicio/catalgo.html">Inicio</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </div>
        <div class="center_logo">
            <img src="img/8665705.jpg" alt="">
        </div>
        <div class="right">
            <a class="bt_entrar" href=""><button>Entrar</button></a>
            <a class="bt_criarConta" href=""><button>Criar conta</button></a>
        </div>
    </header>
    <main id="container_main">
        <div class="container_aviso">
            <span class="aviso_destaque"><p>3 vagas disponíveis</p></span> <p>Garanta sua reserva agora antes que acabe</p>
        </div>
        <div class="container_topo"> <!--Subtitulo, pesquisa, carrinho e favorito-->
            <div class="titulo_pag">
                <h2>Catalogo</h2>
            </div>
            <div class="search">
                <input type="search" name="pesquisar" id="idPesquisar" placeholder="Pesquisar"> <span><i class="fa-brands fa-sistrix"></i></span>
            </div>
            <div class="right_side">
                <a href="#" class="carrinho"</a><i class="fa-solid fa-cart-shopping"></i> <span class="etiqueta"><p>Carrinho</p></span></a>
                <a href="#" class="favorito"><i class="fa-regular fa-heart" style="background-color: #721B1F;"></i><span class="etiqueta"><p style="color: #721B1F;">Favorito</p></span></a>
            </div>
        </div><!--Botões para troca de itens-->
        <div id="container_btCatalogo">
            <div id="btCroches" class="btNav">
                <img src="../img/icones/wool.png" alt="">
                <p>Crochês</p>
            </div>
            <div id="btBordados" class="btNav">
                <img src="../img/icones/bordados.png" alt="">
                <p>Bordados</p>
            </div>
            <div id="btRoupas" class="btNav">
                <img src="../img/icones/dress.png" alt="">
                <p>Roupas</p>
            </div>
            <div id="btAcessorios" class="btNav">
                <img src="../img/icones/scarf.png" alt="">
                <p>Acessórios</p>
            </div>
        </div><!--Fim Botões para troca de itens-->
        <div id="container_catModelos"><!--Seção Catalogo-->
            <div class="top_grid"><!--Modelos da linha de cima-->
                <div class="container_card">
                    <div class="img_card"><img src="..." alt=""></div>
                    <div class="info">
                        <span class="nome_preco">
                            <p>Sueter Feminino</p>
                            <p>R$ 23,99</p>
                        </span>
                        <span class="bt_favorito"><i class="fa-regular fa-heart"></i></span>
                    </div>
                </div>
            </div>
        </div><!--Fim Seção Catalogo-->
    </main>
</body>
</html>
